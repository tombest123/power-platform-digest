
name: Power Platform Digest (Mon/Wed/Fri)

on:
  schedule:
    # 8:00 AM UTC on Monday, Wednesday, Friday
    # Mon = captures Fri/Sat/Sun news
    # Wed = captures Mon/Tue news
    # Fri = captures Wed/Thu news
    - cron: '0 8 * * 1,3,5'
  workflow_dispatch:
    # Manual trigger from the GitHub Actions tab anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run digest and send email
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python digest_runner.py
